<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Rankings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --accent: #f0b429;
    --accent2: #e05252;
    --text: #e8eaf0;
    --muted: #6b7280;
    --qb: #f87171;
    --rb: #60a5fa;
    --wr: #34d399;
    --te: #a78bfa;
    --k:  #fbbf24;
    --dst: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats-bar strong { color: var(--accent); font-size: 1rem; display: block; }

  /* CONTROLS */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-right: 4px;
  }

  .pos-btn {
    padding: 6px 16px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .pos-btn:hover { border-color: var(--text); color: var(--text); }
  .pos-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 600; }

  .pos-btn[data-pos="QB"].active  { background: var(--qb); border-color: var(--qb); }
  .pos-btn[data-pos="RB"].active  { background: var(--rb); border-color: var(--rb); }
  .pos-btn[data-pos="WR"].active  { background: var(--wr); border-color: var(--wr); }
  .pos-btn[data-pos="TE"].active  { background: var(--te); border-color: var(--te); }
  .pos-btn[data-pos="K"].active   { background: var(--k);  border-color: var(--k);  }
  .pos-btn[data-pos="DST"].active { background: var(--dst);border-color: var(--dst);}

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 6px 12px 6px 32px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .reset-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* HINT */
  .hint {
    padding: 8px 32px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* TABLE */
  .table-wrap {
    padding: 0 32px 64px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    min-width: 600px;
  }

  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }

  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }
  tbody tr.moving { background: rgba(240,180,41,0.08); outline: 1.5px solid var(--accent); }

  td {
    padding: 11px 12px;
    font-size: 0.88rem;
    white-space: nowrap;
  }

  .td-rank {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    width: 48px;
    text-align: right;
    padding-right: 20px;
  }

  .td-rank .my-rank {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.95rem;
  }

  .td-name { font-weight: 600; font-size: 0.92rem; }
  .td-name.crossed { text-decoration: line-through; opacity: 0.35; }

  .team-logo {
    width: 24px;
    height: 24px;
    vertical-align: middle;
    flex-shrink: 0;
    border-radius: 5px;
  }

  .name-cell-inner {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .pos-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-left: 8px;
    vertical-align: middle;
    opacity: 0.85;
  }

  .pos-QB  { background: rgba(248,113,113,0.18); color: var(--qb);  }
  .pos-RB  { background: rgba(96,165,250,0.18);  color: var(--rb);  }
  .pos-WR  { background: rgba(52,211,153,0.18);  color: var(--wr);  }
  .pos-TE  { background: rgba(167,139,250,0.18); color: var(--te);  }
  .pos-K   { background: rgba(251,191,36,0.18);  color: var(--k);   }
  .pos-DST { background: rgba(251,146,60,0.18);  color: var(--dst); }

  .td-team {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .td-bye {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    text-align: center;
    color: var(--muted);
  }

  .td-sos { text-align: center; }

  .stars {
    display: inline-flex;
    gap: 1px;
  }

  .star { font-size: 0.65rem; }
  .star.on  { color: var(--accent); }
  .star.off { color: var(--border); }

  .td-ecr {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    text-align: right;
    padding-right: 20px;
  }

  .ecr-pos { color: #34d399; }
  .ecr-neg { color: var(--accent2); }
  .ecr-zero { color: var(--muted); }

  .move-btns {
    display: none;
    flex-direction: column;
    gap: 2px;
  }

  body.edit-mode .move-btns { display: flex; }

  .move-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-size: 0.7rem;
    line-height: 1;
    padding: 3px 6px;
    cursor: pointer;
    transition: all 0.1s;
    touch-action: manipulation;
    user-select: none;
  }

  .move-btn:hover, .move-btn:active { background: var(--accent); border-color: var(--accent); color: #0d0f14; }
  .move-btn:disabled { opacity: 0.2; pointer-events: none; }

  .starter-tag {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-left: 5px;
    vertical-align: middle;
    border: 1px solid currentColor;
  }

  .starter-tag.role-1 { opacity: 1; }
  .starter-tag.role-2 { opacity: 0.55; }
  .starter-tag.role-3 { opacity: 0.3; }

  .starter-QB  { color: var(--qb);  background: rgba(248,113,113,0.1); }
  .starter-RB  { color: var(--rb);  background: rgba(96,165,250,0.1); }
  .starter-WR  { color: var(--wr);  background: rgba(52,211,153,0.1); }
  .starter-TE  { color: var(--te);  background: rgba(167,139,250,0.1); }
  .starter-K   { color: var(--k);   background: rgba(251,191,36,0.1); }
  .starter-DST { color: var(--dst); background: rgba(251,146,60,0.1); }

  .no-results {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .edit-btn {
    padding: 6px 18px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .edit-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; }

  .edit-banner {
    display: none;
    padding: 8px 32px;
    font-size: 0.72rem;
    color: #0d0f14;
    background: var(--accent);
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  body.edit-mode .edit-banner { display: block; }

  @media (max-width: 640px) {
    header, .controls, .hint, .table-wrap { padding-left: 16px; padding-right: 16px; }
    .search-wrap input { width: 150px; }
  }
</style>
</head>

function teamBadge(team) {
  const colors = TEAM_COLORS[team];
  if (!colors) return '';
  const [bg, fg] = colors;
  const abbr = team.length > 3 ? team.slice(0,3) : team;
  return `<svg class="team-logo" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
    <rect width="28" height="28" rx="5" fill="${bg}"/>
    <text x="14" y="19" text-anchor="middle" font-family="'DM Mono',monospace" font-weight="700" font-size="${abbr.length > 2 ? '8' : '9'}" fill="${fg}">${abbr}</text>
  </svg>`;
}

// ── Persistence helpers ──────────────────────────────────────────────
const STORAGE_KEY_ORDER   = 'fantasyRankings_customOrder';
const STORAGE_KEY_CROSSED = 'fantasyRankings_crossed';

function saveState() {
  try {
    const orderMap = {};
    players.forEach(p => { orderMap[p.rk] = p.customOrder; });
    localStorage.setItem(STORAGE_KEY_ORDER, JSON.stringify(orderMap));
    localStorage.setItem(STORAGE_KEY_CROSSED, JSON.stringify([...crossed]));
  } catch(e) {}
}

function loadState() {
  try {
    const rawOrder = localStorage.getItem(STORAGE_KEY_ORDER);
    if (rawOrder) {
      const orderMap = JSON.parse(rawOrder);
      players.forEach(p => {
        if (orderMap[p.rk] !== undefined) p.customOrder = orderMap[p.rk];
      });
    }
    const rawCrossed = localStorage.getItem(STORAGE_KEY_CROSSED);
    if (rawCrossed) JSON.parse(rawCrossed).forEach(rk => crossed.add(rk));
  } catch(e) {}
}
// ────────────────────────────────────────────────────────────────────

// State
let players = RAW.map((p, i) => ({...p, customOrder: i}));

// Enforce: within each team+pos group, assign customOrder slots in ascending order
// so the highest-ranked (lowest rk) player always appears first (is labeled RB1 not RB2 etc.)
(function fixTeamDepthOrder() {
  // Group players by team+pos
  const groups = {};
  players.forEach(p => {
    const key = `${p.team}-${p.pos}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  Object.values(groups).forEach(group => {
    if (group.length < 2) return;
    // Get the customOrder slots this group occupies, sorted ascending
    const slots = group.map(p => p.customOrder).sort((a, b) => a - b);
    // Sort group members by their original rk (consensus rank) ascending
    group.sort((a, b) => a.rk - b.rk);
    // Assign the best slot (lowest customOrder = highest on list) to the best player
    group.forEach((p, i) => { p.customOrder = slots[i]; });
  });
})();
let activePos = 'ALL';
let searchQ = '';
let editMode = false;
const crossed = new Set();

// Load saved state (overwrites defaults if saved data exists)
loadState();

function stars(n) {
  if (n === null || n === undefined) return '<span style="color:#3a4155">—</span>';
  let s = '';
  for (let i = 1; i <= 5; i++) {
    s += `<span class="star ${i <= n ? 'on' : 'off'}">★</span>`;
  }
  return `<span class="stars">${s}</span>`;
}

function ecrBadge(v) {
  if (v === null || v === undefined) return '<span class="ecr-zero">—</span>';
  if (v > 0) return `<span class="ecr-pos">+${v}</span>`;
  if (v < 0) return `<span class="ecr-neg">${v}</span>`;
  return `<span class="ecr-zero">0</span>`;
}

function getFiltered() {
  return players.filter(p => {
    const posMatch = activePos === 'ALL' || p.pos === activePos;
    const q = searchQ.toLowerCase();
    const searchMatch = !q || p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q);
    return posMatch && searchMatch;
  });
}

function render() {
  const tbody = document.getElementById('tableBody');
  const noResults = document.getElementById('noResults');
  const filtered = getFiltered();

  document.getElementById('countFiltered').textContent = filtered.length;
  document.getElementById('countAll').textContent = players.length;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  const sorted = [...filtered].sort((a, b) => a.customOrder - b.customOrder);

  // Compute team position ranks: for each team+pos combo, rank by customOrder
  const allSorted = [...players].sort((a, b) => a.customOrder - b.customOrder);
  const teamPosCounters = {};
  const teamPosRank = {};
  allSorted.forEach(p => {
    const key = `${p.team}-${p.pos}`;
    teamPosCounters[key] = (teamPosCounters[key] || 0) + 1;
    teamPosRank[p.rk] = teamPosCounters[key];
  });

  let html = '';
  sorted.forEach((p, idx) => {
    const myRank = idx + 1;
    const origIdx = RAW.findIndex(r => r.rk === p.rk);
    const origDisplayRank = origIdx + 1;
    const changed = p.customOrder !== origIdx;
    const isFirst = idx === 0;
    const isLast = idx === sorted.length - 1;
    const teamRank = teamPosRank[p.rk];
    const roleLabel = `${p.pos}${teamRank}`;
    // Style: WR1/RB1/QB1/TE1 = bright; WR2/RB2 = dimmer; WR3+ = muted
    const roleClass = teamRank === 1 ? 'role-1' : teamRank === 2 ? 'role-2' : 'role-3';
    html += `<tr data-rk="${p.rk}">
      <td class="td-move">
        <div class="move-btns">
          <button class="move-btn" data-dir="up" data-rk="${p.rk}" ${isFirst ? 'disabled' : ''}>▲</button>
          <button class="move-btn" data-dir="down" data-rk="${p.rk}" ${isLast ? 'disabled' : ''}>▼</button>
        </div>
      </td>
      <td class="td-rank">
        ${changed ? `<span class="my-rank">${origDisplayRank}→${myRank}</span>` : `<span style="color:var(--muted)">${origDisplayRank}</span>`}
      </td>
      <td class="td-name${crossed.has(p.rk) ? ' crossed' : ''}" data-rk="${p.rk}">
        <div class="name-cell-inner">
          ${teamBadge(p.team)}
          <span>${p.name}</span>
          <span class="pos-tag pos-${p.pos}">${p.pos}</span>
          <span class="starter-tag starter-${p.pos} ${roleClass}">${roleLabel}</span>
        </div>
      </td>
      <td class="td-team">${p.team}</td>
      <td class="td-bye">${p.bye ?? '—'}</td>
      <td class="td-sos">${stars(p.sos)}</td>
      <td class="td-ecr">${ecrBadge(p.ecr)}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  updateCustomCount();

  // Cross-out: double-click or double-tap on name cell
  let lastTap = 0;
  tbody.querySelectorAll('.td-name').forEach(cell => {
    const rk = parseInt(cell.dataset.rk);
    cell.addEventListener('dblclick', () => {
      crossed.has(rk) ? crossed.delete(rk) : crossed.add(rk);
      cell.classList.toggle('crossed');
      saveState();
    });
    cell.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 350) {
        e.preventDefault();
        crossed.has(rk) ? crossed.delete(rk) : crossed.add(rk);
        cell.classList.toggle('crossed');
        saveState();
      }
      lastTap = now;
    });
  });

  // Attach move button listeners
  tbody.querySelectorAll('.move-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const rk = parseInt(btn.dataset.rk);
      const dir = btn.dataset.dir;
      movePlayer(rk, dir);
    });
  });
}

function movePlayer(rk, dir) {
  const filtered = getFiltered().sort((a, b) => a.customOrder - b.customOrder);
  const idx = filtered.findIndex(p => p.rk === rk);
  const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= filtered.length) return;

  // Swap customOrder values between the two players
  const a = players.find(p => p.rk === filtered[idx].rk);
  const b = players.find(p => p.rk === filtered[swapIdx].rk);
  const temp = a.customOrder;
  a.customOrder = b.customOrder;
  b.customOrder = temp;

  saveState();
  render();

  // Scroll moved row into view on mobile
  const row = document.querySelector(`tr[data-rk="${rk}"]`);
  if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateCustomCount() {
  const changed = players.filter((p, i) => p.customOrder !== i).length;
  document.getElementById('countCustom').textContent = changed;
}

// EDIT MODE
document.getElementById('editBtn').addEventListener('click', () => {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✓ Done' : '✎ Edit Rankings';
  render();
});

// FILTER BUTTONS
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePos = btn.dataset.pos;
    render();
  });
});

// SEARCH
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// RESET
document.getElementById('resetBtn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY_ORDER);
  localStorage.removeItem(STORAGE_KEY_CROSSED);
  players = RAW.map((p, i) => ({...p, customOrder: i}));
  (function fixTeamDepthOrder() {
    const groups = {};
    players.forEach(p => {
      const key = `${p.team}-${p.pos}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });
    Object.values(groups).forEach(group => {
      if (group.length < 2) return;
      const slots = group.map(p => p.customOrder).sort((a, b) => a - b);
      group.sort((a, b) => a.rk - b.rk);
      group.forEach((p, i) => { p.customOrder = slots[i]; });
    });
  })();
  crossed.clear();
  render();
});

// INIT
render();
</script>
